name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger option

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging Streamlit app to keep it awake..."
          echo "Timestamp: $(date -u)"
          
          for i in 1 2 3; do
            echo "Attempt $i..."
            CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" https://pythontutorandbuilder.streamlit.app/)
            echo "Got response: $CODE"
            
            case "$CODE" in
              200|301|302|303|503)
                echo "✓ Success with code $CODE"
                exit 0
                ;;
              *)
                echo "Unexpected code: $CODE, will retry..."
                ;;
            esac
            
            if [ $i -lt 3 ]; then
              sleep 5
            fi
          done
          
          echo "✗ All attempts failed"
          exit 1
