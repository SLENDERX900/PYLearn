name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger option

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging Streamlit app to keep it awake..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://pythontutorandbuilder.streamlit.app/)
          echo "HTTP Response Code: $response"
          if [ "$response" -eq 200 ] || [ "$response" -eq 301 ] || [ "$response" -eq 302 ]; then
            echo "✓ Successfully pinged Streamlit app"
          else
            echo "✗ Unexpected response code: $response"
            exit 1
          fi
