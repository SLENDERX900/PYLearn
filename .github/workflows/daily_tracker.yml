name: Daily Sentiment Tracker

# Triggers: When does this run?
on:
  schedule:
    - cron: '30 13 * * *'  # Runs at 13:30 UTC every day (approx 9:30 AM EST)
  workflow_dispatch:      # Allows you to click a button to run it manually

permissions:
  contents: write         # CRITICAL: Allows the bot to save the CSV back to the repo

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code from the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Step 3: Install the libraries
      - name: Install libraries
        run: |
          pip install pandas requests nltk
          
      # Step 4: Run your script
      - name: Run Tracker
        run: python SLENTRAC.py

      # Step 5: Save the results (Commit & Push)
      - name: Save CSV results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add *.csv
          # The part below checks if there are changes before committing to avoid errors
          git commit -m "Daily sentiment update" || echo "No changes to commit"
          git push
